name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '8.0.x'
  NODE_VERSION: '18.x'

jobs:
  build-api:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      
      - name: Restore dependencies
        working-directory: ./src/api
        run: dotnet restore
      
      - name: Build
        working-directory: ./src/api
        run: dotnet build --configuration Release --no-restore
      
      - name: Test
        working-directory: ./src/api
        run: dotnet test --configuration Release --no-build --verbosity normal
      
      - name: Publish
        working-directory: ./src/api
        run: dotnet publish -c Release -o ../../publish/api --no-build
      
      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: api
          path: publish/api
          retention-days: 7

  build-web:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: src/web/package-lock.json
      
      - name: Install dependencies
        working-directory: ./src/web
        run: npm ci
      
      - name: Lint
        working-directory: ./src/web
        run: npm run lint
      
      - name: Build
        working-directory: ./src/web
        run: npm run build
      
      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web
          path: src/web/dist
          retention-days: 7

  deploy-staging:
    needs: [build-api, build-web]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: staging
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: api
          path: publish/api
      
      - name: Download Web artifact
        uses: actions/download-artifact@v4
        with:
          name: web
          path: publish/web
      
      - name: Deploy to Staging
        run: |
          az webapp deploy --resource-group thinkfunding-rg-staging \
            --name thinkfunding-api-staging \
            --src-path publish/api \
            --type zip
          
          az webapp deploy --resource-group thinkfunding-rg-staging \
            --name thinkfunding-web-staging \
            --src-path publish/web \
            --type zip

  deploy-production:
    needs: [build-api, build-web]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: api
          path: publish/api
      
      - name: Download Web artifact
        uses: actions/download-artifact@v4
        with:
          name: web
          path: publish/web
      
      - name: Deploy to Production
        run: |
          az webapp deploy --resource-group thinkfunding-rg \
            --name thinkfunding-api \
            --src-path publish/api \
            --type zip
          
          az webapp deploy --resource-group thinkfunding-rg \
            --name thinkfunding-web \
            --src-path publish/web \
            --type zip
